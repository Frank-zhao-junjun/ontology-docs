name: backend-ci

on:
  push:
    paths:
      - "Cursor/backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "Cursor/backend/**"

defaults:
  run:
    working-directory: Cursor/backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Pytest
        run: python -m pytest tests -v
